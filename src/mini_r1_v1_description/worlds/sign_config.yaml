# Maps sign type names to a base image and a transformation.
# To add a new sign type, add an entry here and place its base image
# in the same directory as this config file.
#
# Fields:
#   base_image           - filename of the source PNG (in worlds/)
#   rotation_cw_deg      - clockwise rotation to apply (0, 90, 180, 270)
#   mirror_horizontal    - if true, flip the image left↔right after rotation

forward:
  base_image: forward.png
  rotation_cw_deg: 0
  mirror_horizontal: false

left:
  base_image: forward.png
  rotation_cw_deg: 270
  mirror_horizontal: false

right:
  base_image: forward.png
  rotation_cw_deg: 90
  mirror_horizontal: false

rotate_180_clockwise:
  base_image: rotate_180_clockwise.png
  rotation_cw_deg: 0
  mirror_horizontal: false

rotate_180_anticlockwise:
  base_image: rotate_180_clockwise.png
  rotation_cw_deg: 0
  mirror_horizontal: true
