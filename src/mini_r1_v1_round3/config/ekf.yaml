# robot_localization EKF config for Mini R1 v1
# Matches legacy config: fuses wheel odom velocities + IMU orientation
ekf_filter_node:
  ros__parameters:
    use_sim_time: true
    frequency: 20.0
    two_d_mode: true
    publish_tf: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # ── Odom input (wheel encoders from diff drive) ──
    # Trust wheel odom ONLY for X/Y linear velocity.
    # Wheel yaw-rate is unreliable in Gazebo (phantom rotation from slip) —
    # IMU is our only trustworthy yaw source.
    odom0: /r1_mini/odom
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  true,  false,
                   false, false, false,
                   false, false, false]
    odom0_differential: false

    # ── IMU input ──
    # Trust IMU for absolute yaw orientation, yaw velocity, and X/Y accel
    imu0: /r1_mini/imu
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, true,
                  true,  true,  false]
    imu0_differential: false
