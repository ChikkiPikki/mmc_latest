slam_toolbox:
  ros__parameters:
    use_sim_time: true

    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /r1_mini/lidar
    mode: mapping

    transform_publish_period: 0.05
    map_update_interval: 1.0
    transform_timeout: 1.0
    tf_buffer_duration: 30.0
    minimum_time_interval: 0.5
    stack_size_to_use: 40000000
    enable_interactive_mode: false

    resolution: 0.05
    max_laser_range: 10.0
    minimum_travel_distance: 0.3
    minimum_travel_heading: 0.3

    use_scan_matching: true
    use_scan_barycenter: true
    debug_logging: false
    throttle_scans: 1
    position_covariance_scale: 1.0
    yaw_covariance_scale: 1.0

    # Looser loop-closure thresholds so the solver can re-latch when scan
    # matching briefly diverges (bot stuck against a wall, wheel slip,
    # lidar occluded by dynamic obstacle). Larger search distance/dim
    # means the relocalizer considers candidates further afield.
    do_loop_closing: true
    loop_search_maximum_distance: 3.0
    loop_match_minimum_chain_size: 6
    loop_match_maximum_variance_coarse: 6.0
    loop_match_minimum_response_coarse: 0.25
    loop_match_minimum_response_fine: 0.35
    loop_search_space_dimension: 10.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.05

    # Wider correlation search so brief pose drift doesn't lose tracking.
    correlation_search_space_dimension: 1.0
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1

    # Lower variance penalties + response expansion = more forgiving when
    # the robot's pose hypothesis is uncertain (what "stuck" typically
    # produces). use_response_expansion lets the matcher iteratively
    # widen the search until a reasonable match is found.
    distance_variance_penalty: 0.3
    angle_variance_penalty: 0.6
    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.52           # was 20°, now 30°
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.7
    minimum_distance_penalty: 0.3
    use_response_expansion: true

    # Bigger scan buffer + longer link distance = more scans participate
    # in the pose graph, giving the solver more constraints to fall back
    # on during recovery.
    scan_buffer_size: 20
    scan_buffer_maximum_scan_distance: 10.0
    link_match_minimum_response_fine: 0.08
    link_scan_maximum_distance: 3.0
