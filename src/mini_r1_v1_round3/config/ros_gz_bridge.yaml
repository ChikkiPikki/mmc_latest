# ==========================================================
# SYSTEM & TIME
# ==========================================================
- topic_name: "/clock"
  ros_type_name: "rosgraph_msgs/msg/Clock"
  gz_type_name: "ignition.msgs.Clock"
  direction: GZ_TO_ROS

# ==========================================================
# CONTROL & DRIVE
# ==========================================================
- ros_topic_name: "/cmd_vel"
  gz_topic_name: "/cmd_vel"
  ros_type_name: "geometry_msgs/msg/Twist"
  gz_type_name: "ignition.msgs.Twist"
  direction: ROS_TO_GZ

# ==========================================================
# ODOM & JOINTS
# ==========================================================
- ros_topic_name: "/r1_mini/odom"
  gz_topic_name: "/r1_mini/odom"
  ros_type_name: "nav_msgs/msg/Odometry"
  gz_type_name: "ignition.msgs.Odometry"
  direction: GZ_TO_ROS

- ros_topic_name: "/joint_states"
  gz_topic_name: "/r1_mini/joint_states"
  ros_type_name: "sensor_msgs/msg/JointState"
  gz_type_name: "ignition.msgs.Model"
  direction: GZ_TO_ROS

# ==========================================================
# TF — odom→base_link is published by the EKF node, NOT bridged
# from Gazebo directly (bridging both causes TF jitter).
# ==========================================================

# ==========================================================
# SENSORS
# ==========================================================
- ros_topic_name: "/r1_mini/lidar"
  gz_topic_name: "/r1_mini/lidar"
  ros_type_name: "sensor_msgs/msg/LaserScan"
  gz_type_name: "ignition.msgs.LaserScan"
  direction: GZ_TO_ROS

- ros_topic_name: "/r1_mini/imu"
  gz_topic_name: "/r1_mini/imu"
  ros_type_name: "sensor_msgs/msg/Imu"
  gz_type_name: "ignition.msgs.IMU"
  direction: GZ_TO_ROS

# Camera topics: sensor-data QoS (BEST_EFFORT) on both publish side and
# subscribe side. Default RELIABLE for 30Hz 640×480 images caused bridge
# backpressure; apriltag_node was only getting 3-6 images / 10s vs 18
# camera_info, so detections ran at <1 Hz.
- ros_topic_name: "/r1_mini/camera/image_raw"
  gz_topic_name: "/r1_mini/camera/image"
  ros_type_name: "sensor_msgs/msg/Image"
  gz_type_name: "ignition.msgs.Image"
  direction: GZ_TO_ROS
  lazy: false
  ros_qos_reliability: best_effort
  ros_qos_durability: volatile
  ros_qos_history: keep_last
  ros_qos_depth: 5

- ros_topic_name: "/r1_mini/camera/camera_info"
  gz_topic_name: "/r1_mini/camera/camera_info"
  ros_type_name: "sensor_msgs/msg/CameraInfo"
  gz_type_name: "ignition.msgs.CameraInfo"
  direction: GZ_TO_ROS
  lazy: false
  ros_qos_reliability: best_effort
  ros_qos_durability: volatile
  ros_qos_history: keep_last
  ros_qos_depth: 5

- ros_topic_name: "/r1_mini/camera/depth_image"
  gz_topic_name: "/r1_mini/camera/depth_image"
  ros_type_name: "sensor_msgs/msg/Image"
  gz_type_name: "ignition.msgs.Image"
  direction: GZ_TO_ROS
  lazy: false
  ros_qos_reliability: best_effort
  ros_qos_durability: volatile
  ros_qos_history: keep_last
  ros_qos_depth: 5

# /r1_mini/camera/points bridge removed — the gz RGBD point cloud
# (~300k points × 30Hz) was the biggest single drain on sim RTF and
# nothing in the stack actually consumed it. logo_detector builds its
# own colored cloud on /logo/points from RGB + depth.
