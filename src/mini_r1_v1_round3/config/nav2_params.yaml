controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    odom_topic: /odometry/filtered
    progress_checker_plugin: progress_checker
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.1
      movement_time_allowance: 20.0

    general_goal_checker:
      plugin: nav2_controller::SimpleGoalChecker
      xy_goal_tolerance: 0.22
      yaw_goal_tolerance: 0.2
      stateful: true

    FollowPath:
      # Back to RPP with aggressive rotate-to-heading. DWB kept averaging
      # low-omega samples even after aggressive critic rebalancing — a
      # structural consequence of sampling-based scoring on a diff-drive
      # that needs big pure-rotation turns. RPP's explicit rotate-in-
      # place phase (triggered whenever |heading_err| > min_angle) turns
      # the bot first, then commits to forward motion.
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.45
      # Lookahead: short enough to react to actual path corrections but
      # not so short the bot overshoots. Velocity-scaled on top.
      min_lookahead_dist: 0.40
      lookahead_dist: 0.70
      max_lookahead_dist: 1.00
      lookahead_time: 1.5
      use_velocity_scaled_lookahead_dist: true
      transform_tolerance: 0.3
      min_approach_linear_velocity: 0.08
      approach_velocity_scaling_dist: 0.50
      # Curvature regulation: mild slowdown on sharp bends, not aggressive
      use_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 0.45
      regulated_linear_scaling_min_speed: 0.25
      use_cost_regulated_linear_velocity_scaling: true
      inflation_cost_scaling_factor: 3.0
      # ★ ROTATE-IN-PLACE is the whole point. Any heading error > ~35°
      # triggers a pure-rotation phase. High angular vel + accel so the
      # rotation is fast, not sluggish. Once aligned, forward motion.
      use_rotate_to_heading: true
      rotate_to_heading_min_angle: 0.60
      rotate_to_heading_angular_vel: 2.2
      max_angular_accel: 6.0
      # Safety check on short-horizon rollout.
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.5
      allow_reversing: false
      max_robot_pose_search_dist: 10.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      # Explicit rectangular footprint (wheels at x=±0.13, y=±0.114; +~4cm margin).
      footprint: "[[0.17, 0.16], [0.17, -0.16], [-0.17, -0.16], [-0.17, 0.16]]"
      footprint_padding: 0.0
      transform_tolerance: 0.3
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        scan:
          topic: /r1_mini/lidar
          max_obstacle_height: 2.0
          min_obstacle_height: 0.0
          obstacle_max_range: 8.0
          obstacle_min_range: 0.0
          raytrace_max_range: 10.0
          raytrace_min_range: 0.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          inf_is_valid: false
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 5.0
        inflation_radius: 0.06
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      # Static, arena-wide global costmap — rolling_window:true dropped
      # walls behind the robot as the window moved, so the planner kept
      # rediscovering "free" space it had already mapped. Size covers the
      # full arena (~3.6×4.5m) with generous margin.
      rolling_window: false
      width: 15
      height: 15
      origin_x: -7.5
      origin_y: -7.5
      resolution: 0.05
      footprint: "[[0.17, 0.16], [0.17, -0.16], [-0.17, -0.16], [-0.17, 0.16]]"
      footprint_padding: 0.0
      track_unknown_space: true
      transform_tolerance: 0.3
      # static_layer was removed: it sizes the global costmap to match
      # slam_toolbox's /map, which starts tiny and grows, so frontier /
      # sweep goals outside the mapped region were being rejected with
      # "goal off global costmap". obstacle_layer with rolling_window:
      # false + explicit 15×15 bounds retains wall marks (no window to
      # drop them) and lidar-raytraces clear space as we drive.
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        scan:
          topic: /r1_mini/lidar
          max_obstacle_height: 2.0
          min_obstacle_height: 0.0
          obstacle_max_range: 8.0
          obstacle_min_range: 0.0
          # Freeze walls into the global costmap as soon as lidar sees them.
          # clearing:false means cells marked as obstacles are NEVER raytraced
          # away, so walls the robot saw once stay in the costmap even if the
          # bot later looks elsewhere or a beam passes through (TF drift,
          # through-glass scans, etc.). raytrace_max_range is also dropped to
          # 0.0 as a belt-and-braces disable of the clearing pass.
          raytrace_max_range: 0.0
          raytrace_min_range: 0.0
          clearing: false
          marking: true
          data_type: "LaserScan"
          inf_is_valid: false
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 5.0
        inflation_radius: 0.06
      always_send_full_costmap: true

planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: nav2_navfn_planner/NavfnPlanner
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

behavior_server:
  ros__parameters:
    use_sim_time: true
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: nav2_behaviors/Spin
    backup:
      plugin: nav2_behaviors/BackUp
    drive_on_heading:
      plugin: nav2_behaviors/DriveOnHeading
    wait:
      plugin: nav2_behaviors/Wait
    assisted_teleop:
      plugin: nav2_behaviors/AssistedTeleop
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 2.0

waypoint_follower:
  ros__parameters:
    use_sim_time: true
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.65, 0.0, 2.5]
    min_velocity: [-0.20, 0.0, -2.5]
    max_accel: [2.5, 0.0, 6.0]
    max_decel: [-2.5, 0.0, -6.0]
    odom_topic: "/odometry/filtered"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

smoother_server:
  ros__parameters:
    use_sim_time: true
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true
