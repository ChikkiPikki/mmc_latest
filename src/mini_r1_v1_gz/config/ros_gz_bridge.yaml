# ==========================================================
# SYSTEM & TIME
# ==========================================================
- topic_name: "/clock"
  ros_type_name: "rosgraph_msgs/msg/Clock"
  gz_type_name: "ignition.msgs.Clock"
  direction: GZ_TO_ROS

# ==========================================================
# CONTROL & DRIVE
# ==========================================================
- ros_topic_name: "/cmd_vel_stamped"
  gz_topic_name: "/cmd_vel"
  ros_type_name: "geometry_msgs/msg/TwistStamped"
  gz_type_name: "ignition.msgs.Twist"
  direction: ROS_TO_GZ

- ros_topic_name: "/cmd_vel"
  gz_topic_name: "/cmd_vel"
  ros_type_name: "geometry_msgs/msg/Twist"
  gz_type_name: "ignition.msgs.Twist"
  direction: ROS_TO_GZ

# ==========================================================
# ODOM & JOINTS
# ==========================================================
- ros_topic_name: "/r1_mini/odom"
  gz_topic_name: "/r1_mini/odom"
  ros_type_name: "nav_msgs/msg/Odometry"
  gz_type_name: "ignition.msgs.Odometry"
  direction: GZ_TO_ROS

- ros_topic_name: "/joint_states"
  gz_topic_name: "/r1_mini/joint_states"
  ros_type_name: "sensor_msgs/msg/JointState"
  gz_type_name: "ignition.msgs.Model"
  direction: GZ_TO_ROS

# ==========================================================
# TF — odom→base_link is published by the EKF node, NOT bridged
# from Gazebo directly (bridging both causes TF jitter).
# ==========================================================

# ==========================================================
# SENSORS
# ==========================================================
- ros_topic_name: "/r1_mini/lidar"
  gz_topic_name: "/r1_mini/lidar"
  ros_type_name: "sensor_msgs/msg/LaserScan"
  gz_type_name: "ignition.msgs.LaserScan"
  direction: GZ_TO_ROS

- ros_topic_name: "/r1_mini/imu"
  gz_topic_name: "/r1_mini/imu"
  ros_type_name: "sensor_msgs/msg/Imu"
  gz_type_name: "ignition.msgs.IMU"
  direction: GZ_TO_ROS

- ros_topic_name: "/r1_mini/camera/image_raw"
  gz_topic_name: "/r1_mini/camera/image"
  ros_type_name: "sensor_msgs/msg/Image"
  gz_type_name: "ignition.msgs.Image"
  direction: GZ_TO_ROS

- ros_topic_name: "/r1_mini/camera/camera_info"
  gz_topic_name: "/r1_mini/camera_info"
  ros_type_name: "sensor_msgs/msg/CameraInfo"
  gz_type_name: "ignition.msgs.CameraInfo"
  direction: GZ_TO_ROS

- ros_topic_name: "/r1_mini/camera/depth_image"
  gz_topic_name: "/r1_mini/camera/depth_image"
  ros_type_name: "sensor_msgs/msg/Image"
  gz_type_name: "ignition.msgs.Image"
  direction: GZ_TO_ROS

- ros_topic_name: "/r1_mini/camera/points"
  gz_topic_name: "/r1_mini/camera/points"
  ros_type_name: "sensor_msgs/msg/PointCloud2"
  gz_type_name: "ignition.msgs.PointCloudPacked"
  direction: GZ_TO_ROS
